name: 'Terraform Enterprise GitOps'

on:
  push:
    branches: [ "main" ] # Runs every time you push to the main branch

jobs:
  terraform:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest

    # Load the keys from the GitHub Vault
    env:
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }} # Feeds your main.tf variable
      TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }} # Feeds your database password

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: "1.5.0"

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -no-color

    - name: Terraform Apply
      # Only actually change the cloud if the code is on the main branch
      if: github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve