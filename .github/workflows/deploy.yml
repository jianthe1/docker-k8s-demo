name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1. NEW: Set up an emulator so GitHub can build ARM processors
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        
      # 2. NEW: Set up Docker Buildx (the advanced builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 3. NEW: Explicitly tell Docker to build for your Oracle ARM server!
          platforms: linux/arm64 
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Set up Kubernetes access
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy to K8s cluster
        run: |
          # 1. Apply the base infrastructure (Services, Redis, etc.)
          kubectl apply -f k8s-deployment.yaml
          
          # 2. Tell K8s to directly update ONLY the web-app container with the new unique image tag!
          kubectl set image deployment/web-deployment web-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
