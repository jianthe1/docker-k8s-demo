name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    # Optional: Ignore changes to the k8s folder so the pipeline doesn't trigger itself in an infinite loop
    paths-ignore:
      - 'k8s/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # IMPORTANT: Changed to 'write' so the pipeline can push the YAML update to GitHub
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1. Set up an emulator so GitHub can build ARM processors
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      # 2. Set up Docker Buildx (the advanced builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Authenticate with GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build and push the ARM64 image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Explicitly tell Docker to build for your Oracle ARM server!
          platforms: linux/arm64 
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      # 5. The GitOps Way: Update the YAML file and let ArgoCD handle the K8s deployment
      - name: Update K8s YAML and push to GitHub
        run: |
          # Use sed to swap out the old image tag for the new GitHub SHA tag in your YAML
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" k8s/k8s-deployment.yaml
          
          # Tell Git who is making the commit
          git config --global user.name "GitHub Actions CI"
          git config --global user.email "actions@github.com"
          
          # Commit and push the updated YAML back to the repo
          git add k8s/k8s-deployment.yaml
          git commit -m "Auto-update image tag to ${{ env.IMAGE_TAG }}"
          git push