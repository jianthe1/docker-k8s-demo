apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  namespace: my-web-app
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: ghcr.io/jianthe1/docker-k8s-demo:latest
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: PGHOST
          value: "db"