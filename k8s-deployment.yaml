apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: my-web-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:latest
        command: ["redis-server", "--appendonly", "yes"]  # <--- NEW: Tell Redis to save to disk
        ports:
        - containerPort: 6379
        # === NEW: Plug in the USB Drive ===
        volumeMounts:               
        - name: redis-storage
          mountPath: /data
      volumes:                      
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-data-pvc
      # ==================================
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: my-web-app
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: my-web-app
spec:
  replicas: 3
# === NEW: Rolling Update Strategy ===
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # Build 1 new pod at a time
      maxUnavailable: 0  # Never let the active pod count drop below 3 during the update
      
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web-app
        image: ghcr.io/jianthe1/docker-k8s-demo:latest 
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        # === CONNECTION CONFIGS ===
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: PGHOST
          value: "db"
        - name: PGPASSWORD
          value: "postgres"
        - name: PGDATABASE
          value: "postgres"
         # ========================== 
        readinessProbe:
          httpGet:
            path: /readyz           # The URL path K8s will check
            port: 3000
          initialDelaySeconds: 5  # Wait 5 seconds after boot before checking
          periodSeconds: 10       # Check every 10 seconds
          
        # === NEW: Liveness Probe ===
        # Checks if the app has frozen and needs a reboot
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15 # Give it extra time to boot before threatening to kill it
          periodSeconds: 20
        # === NEW: Add Resource Limits ===
        resources:
          requests:
            cpu: "50m"      # Ask for 5% of a CPU core to start
            memory: "64Mi"  # Ask for 64 Megabytes of RAM
          limits:
            cpu: "200m"     # NEVER let this pod use more than 20% of a core
            memory: "128Mi" # NEVER let this pod use more than 128 MB of RAM

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-hpa
  namespace: my-web-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-deployment # This must exactly match the name of your deployment!
  minReplicas: 2         # Never go below 2 pods (for high availability)
  maxReplicas: 10        # Never go above 10 pods (to save money/resources)
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50 # If the average CPU hits 50%, spin up a new pod!
        
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: my-web-app
spec:
  type: LoadBalancer 
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 3000


---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
  namespace: my-web-app
  annotations:
    # This tells Traefik not to force HTTPS just yet
    traefik.ingress.kubernetes.io/router.entrypoints: web, websecure
    # --- NEW: Call the Security Guard ---
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # ------------------------------------
spec:
  rules:
  - host: testermy-apps.duckdns.org  
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-service
            port:
              number: 80
              # --- NEW: Tell Traefik to encrypt the traffic ---
  tls:
  - hosts:
    - testermy-apps.duckdns.org       # <--- Put your exact domain here again
    secretName: web-ssl-cert     # K8s will automatically save the certificate here
  # ------------------------------------------------

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-pvc
  namespace: my-web-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-deployment
  namespace: my-web-app
  labels:
    app: vote
spec:
  replicas: 2 # Running 2 copies for high availability!
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - name: vote
        # ARCHITECT'S NOTE: If you built your own custom Docker image, change this line!
        image: ghcr.io/jianthe1/docker-k8s-demo:latest 
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: PGHOST
          value: "db"
        - name: PGPASSWORD
          value: "postgres"
---
apiVersion: v1
kind: Service
metadata:
  name: vote-service
  namespace: my-web-app
spec:
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 80
  selector:
    app: vote

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  namespace: my-web-app
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: ghcr.io/jianthe1/docker-k8s-demo:latest 
        imagePullPolicy: Always
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: PGHOST
          value: "db"
# ==============================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
  namespace: my-web-app
  labels:
    app: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  # CRITICAL: The default worker looks exactly for the DNS name "db"
  name: db 
  namespace: my-web-app
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: db
